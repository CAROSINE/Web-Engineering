<html>
    <head>
        <title>Admission</title>
    </head>
    <body>
        
        <h1><center>Admission Form</center></h1>
        <form>
            <label for ="name">Name: </label>
            <input type="text" id="name" name="name" required placeholder="Name"><br><br>

            <label for ="email">Email: </label>
            <input type="email" id="email" name="email" required><br><br>

            <label for ="phone">Phone: </label>
            <input type="tel" id="phone" name="phone" required><br><br>

            <label for ="address">Address: </label>
            <input type="text" id="address" name="address" required><br><br>

            <label for ="blood">Blood Group 🩸 </label>
            <select id="blood" name="blood" required>
                <option value="">Select</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
            </select><br><br>

            <label for ="gender">Gender: </label>
            <select id="gender" name="gender" required>
                <option value="">Select</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select><br><br>

            <label for="district">District: </label>
            <select id="district" name="district" required>
                <option value="">Select</option>
                <option value="Dhaka">Dhaka</option>
                <option value="Chittagong">Chittagong</option>
                <option value="Khulna">Khulna</option>
                <option value="Rajshahi">Rajshahi</option>
                <option value="Barisal">Barisal</option>
                <option value="Sylhet">Sylhet</option>
                <option value="Rangpur">Rangpur</option>
                <option value="Mymensingh">Mymensingh</option>
            </select><br><br>


            <label for="upazila">Upazila: </label>
            <input type="text" id="upazila" name="upazila" required><br><br>


            <b>Enter about yourself:</b><br>
            <textarea id="about" name="about" rows="4" cols="50" placeholder="Write something about yourself..."></textarea><br><br>

        </form>
    </body>
</html>
